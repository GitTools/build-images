name: 'Build Deps Manifest'
description: 'Docker Build Deps Images Manifest'
inputs:
  docker_distro:
    description: 'Linux Distro'
    required: true
  docker_registry:
    description: 'Docker Registry'
    required: true
  docker_registry_name:
    description: 'Docker Registry Name'
    required: true
  docker_registry_username:
    description: 'Docker Registry Username'
    required: true
  docker_registry_password:
    description: 'Docker Registry Password'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Login to ${{ inputs.docker_registry }}
      if: ${{ env.PUSH_IMAGES == 'true' }}
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.docker_registry }}
        username: ${{ inputs.docker_registry_username }}
        password: ${{ inputs.docker_registry_password }}

    - name: '[Build Docker Deps manifest] ${{ inputs.docker_registry }}'
      shell: pwsh
      env:
        INPUT_DOCKER_DISTRO: ${{ inputs.docker_distro }}
        INPUT_DOCKER_REGISTRY_NAME: ${{ inputs.docker_registry_name }}
        PUSH_IMAGES: ${{ env.PUSH_IMAGES }}
      run: |
        $args = @(
          '--target=DockerBuildDepsManifest'
          "--docker_distro=$env:INPUT_DOCKER_DISTRO"
          "--docker_registry=$env:INPUT_DOCKER_REGISTRY_NAME"
          "--push_images=$env:PUSH_IMAGES"
          '--verbosity=diagnostic'
        )
        dotnet run/build.dll @args

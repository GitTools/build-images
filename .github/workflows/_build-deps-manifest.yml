on:
  workflow_call:
    inputs:
      docker_distros:
        required: true
        type: string
      push_images:
        required: true
        type: boolean
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: false
env:
  DOTNET_INSTALL_DIR: "./.dotnet"
  DOTNET_ROLL_FORWARD: "Major"
  PUSH_IMAGES: ${{ inputs.push_images }}

permissions:
  packages: write

jobs:
  build_deps_manifests:
    name: ${{ matrix.docker_distro }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        docker_distro: ${{ fromJson(inputs.docker_distros) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use cached cake frosting
        id: cache-cake
        uses: actions/cache@v5
        with:
          path: run
          key: run-${{ runner.os }}-${{ hashFiles('./build/**') }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: build/global.json

      - name: Set up Docker
        uses: ./.github/actions/docker-setup

      - name: Load DockerHub credentials
        id: dockerhub-creds
        if: env.PUSH_IMAGES == 'true'
        uses: gittools/cicd/dockerhub-creds@0c8902c4b7acb983d3ca3a2edf24b8ff3967fa94 # v2
        with:
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Publish image manifest to DockerHub
        if: env.PUSH_IMAGES == 'true'
        uses: ./.github/actions/build-deps-manifest
        with:
          docker_distro: ${{ matrix.docker_distro }}
          docker_registry: docker.io
          docker_registry_name: dockerhub
          docker_registry_username: ${{ steps.dockerhub-creds.outputs.docker_username }}
          docker_registry_password: ${{ steps.dockerhub-creds.outputs.docker_password }}

      - name: Publish image manifest to GitHub
        uses: ./.github/actions/build-deps-manifest
        with:
          docker_distro: ${{ matrix.docker_distro }}
          docker_registry: ghcr.io
          docker_registry_name: github
          docker_registry_username: ${{ github.repository_owner }}
          docker_registry_password: ${{ github.token }}

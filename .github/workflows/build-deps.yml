name: Build Deps

on:
  workflow_dispatch:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 11 * * 1,4"

permissions:
  contents: read

jobs:
  prepare:
    permissions:
      packages: write
    name: Prepare Build
    runs-on: ubuntu-24.04
    outputs:
      docker_distros: ${{ steps.set_matrix.outputs.docker_distros }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache cake frosting
        id: cache-cake
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: run
          key: run-${{ runner.os }}-${{ hashFiles('./build/**') }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: build/global.json

      - name: "[Prepare]"
        if: steps.cache-cake.outputs.cache-hit != 'true'
        run: dotnet build build/ --configuration=Release

      - name: "[Matrix]"
        id: set_matrix
        run: dotnet run/build.dll --target=SetMatrix

  build_deps:
    permissions:
      contents: read
      packages: write
    name: Build Deps (${{ matrix.arch }})
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    uses: ./.github/workflows/_build-deps.yml
    with:
      runner: ${{ matrix.runner }}
      arch: ${{ matrix.arch }}
      docker_distros: ${{ needs.prepare.outputs.docker_distros }}
      push_images: ${{ github.event_name != 'pull_request' && github.repository_owner == 'GitTools' }}

  build_deps_manifests:
    permissions:
      contents: read
      packages: write
    name: Build Deps Manifests
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    needs: [prepare, build_deps]
    uses: ./.github/workflows/_build-deps-manifest.yml
    with:
      docker_distros: ${{ needs.prepare.outputs.docker_distros }}
      push_images: ${{ github.event_name != 'pull_request' && github.repository_owner == 'GitTools' }}

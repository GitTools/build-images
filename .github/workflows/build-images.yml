name: Build Images

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ Build Deps ]
    types:
      - completed

permissions:
  contents: read

jobs:
  prepare:
    permissions:
      packages: write
    name: Prepare Build
    runs-on: ubuntu-24.04
    outputs:
      docker_distros: ${{ steps.set_matrix.outputs.docker_distros }}
      dotnet_versions: ${{ steps.set_matrix.outputs.dotnet_versions }}
      dotnet_variants: ${{ steps.set_matrix.outputs.dotnet_variants }}
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'pull_request' && github.event.workflow_run.head_repository.fork == false && github.event.workflow_run.head_repository.full_name == github.repository) }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.head_repository.fork == false && github.event.workflow_run.head_repository.full_name == github.repository) }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache cake frosting
        id: cache-cake
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: run
          key: run-${{ runner.os }}-${{ hashFiles('./build/**') }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: build/global.json

      - name: '[Prepare]'
        if: steps.cache-cake.outputs.cache-hit != 'true'
        run: dotnet build build/ --configuration=Release

      - name: '[Matrix]'
        id: set_matrix
        run: dotnet run/build.dll --target=SetMatrix

  build_images:
    permissions:
      contents: read
      packages: write
    name: Build Images (${{ matrix.dotnet_variant }} - ${{ matrix.arch }})
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    needs: [ prepare ]
    strategy:
      fail-fast: false
      matrix:
        dotnet_variant: ${{ fromJson(needs.prepare.outputs.dotnet_variants) }}
        arch: [ amd64, arm64 ]
        runner: [ ubuntu-24.04, ubuntu-24.04-arm ]
        exclude:
          - runner: ubuntu-24.04-arm
            arch: amd64
          - runner: ubuntu-24.04
            arch: arm64

    uses: ./.github/workflows/_build-images.yml
    with:
      runner: ${{ matrix.runner }}
      arch: ${{ matrix.arch }}
      dotnet_variant: ${{ matrix.dotnet_variant }}
      dotnet_versions: ${{ needs.prepare.outputs.dotnet_versions }}
      docker_distros: ${{ needs.prepare.outputs.docker_distros }}
      push_images: ${{ github.repository_owner == 'GitTools' }}

  build_images_manifest:
    permissions:
      contents: read
      packages: write
    name: Build Images Manifest (${{ matrix.dotnet_variant }})
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    needs: [ prepare, build_images ]
    strategy:
      fail-fast: false
      matrix:
        dotnet_variant: ${{ fromJson(needs.prepare.outputs.dotnet_variants) }}

    uses: ./.github/workflows/_build-images-manifest.yml
    with:
      runner: ${{ matrix.runner }}
      dotnet_variant: ${{ matrix.dotnet_variant }}
      dotnet_versions: ${{ needs.prepare.outputs.dotnet_versions }}
      docker_distros: ${{ needs.prepare.outputs.docker_distros }}
      push_images: ${{ github.repository_owner == 'GitTools' }}
